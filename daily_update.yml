name: Daily CS2 Data Update
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m playwright install chromium --with-deps
      - run: python scripts/hltv_parser.py teams
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: python scripts/liquipedia_parser.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: python scripts/fetch_matches_news.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
